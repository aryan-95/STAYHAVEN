name: Build WF

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend   # 👈 fixed
    steps:
      - name: Code-checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
      - run: npm test

  testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code-checkout
        uses: actions/checkout@v5