name: Build WF

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code-checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4

      - run: npm ci
      - run: npm run build
      - run: npm test

  testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code-checkout
        uses: actions/checkout@v4